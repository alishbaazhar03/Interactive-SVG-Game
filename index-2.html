<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <link rel="stylesheet" href="style.css">

    <!--I, Alishba Azhar, 000925324, certify that this material is my original work. 
    No other person's work has been used without due acknowledgment and 
    I have not made my work available to anyone else.-->
    
</head>
<body>
    <header>
        <h1>Flappy Bird Game</h1>
        <div class="score">Score: 0</div>
    </header>
    <div class="svg-container">
        <svg id="gameArea" width="80%" height="400"></svg>
    </div>
    <footer>
        <p>© Alishba Azhar, 2024</p>
    </footer>

    <!-- Game Over Popup -->
    <div id="gameOverPopup" class="hidden">
        <div class="popup-content">
            <h2>Game Over</h2>
            <p>Your Score: <span id="finalScore"></span></p>
            <button id="restartButton">Restart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
